name: Deploy to EC2    # name of the workflow 

on:               # when to trigger the workflow
  push:
    branches: master
    paths:        # when which path it will trigger
      - "main.py"
  workflow_dispatch: # allows us to trigger the workflow manually 

env: # setting environment variables 
  # ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com
  # ECR_REPOSITORY: fastapi-app-prod
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
  IMAGE_TAG: ${{ github.sha }}  # unique identifier for each commit

jobs: # jobs section contain multiple jobs that run in parallel 
  # job 1: testing the code 
  simple-test:
    runs-on: ubuntu-latest

    strategy: # strategy section is used to run the job multiple times with different inputs
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
 
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
 
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
 
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install ruff mypy
 
      - name: Run Ruff (Lint & Format)
        run: ruff check .

      - name: Run mypy (Type Checking)
        run: mypy . --ignore-missing-imports

  Testing-complete:
    runs-on: ubuntu-latest
    needs: simple-test
    steps:
      - name: Testing complete
        run: echo "✅ All Tests Passed ✅, deploying to EC2"

  Build-image:
    needs: Testing-complete
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Login to Docker Hub
        uses: docker/login-action@f4ef78c080cd8ba55a85445d5b36e214a81df20a
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

    ### Build Docker Image ###
      - name: Build docker image
        uses: docker/build-push-action@3b5e8027fcad23fda98b2e3ac259d8d67585f671
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: ${{ env.DOCKERHUB_USERNAME }}/todo-streamlit-app:${{ env.IMAGE_TAG }}
          build-args: |
            TestEnv=Dev
      
  Image-scan:
    runs-on: ubuntu-latest
    needs: Build-image
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.DOCKERHUB_USERNAME }}/todo-streamlit-app:${{ env.IMAGE_TAG }}
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'
  
        